# Updated with each release per IEC 62304 SOUP anomaly assessment requirements
# Schema version: 1.0
# Last updated: 2026-03-20
# MIME version: 0.1.0

schema_version: "1.0"
mime_version: "0.1.0"
generated_date: "2026-03-20"

anomalies:
  - anomaly_id: MIME-ANO-001
    title: "Constant rotational drag underestimates speed at higher magnet counts"
    description: >
      The UMR ODE model uses a single rotational drag coefficient C_rot
      calibrated from the 1-magnet step-out frequency. When predicting
      the 3-magnet configuration, the model systematically underpredicts
      steady-state swimming speed by approximately 17% (predicted 0.71 m/s
      vs measured 0.86 m/s). This grows with magnet count because the
      constant C_rot does not account for changes in body geometry or
      flow coupling when additional magnets are embedded.
    severity: minor
    safety_relevance: safety_relevant
    safety_relevance_rationale: >
      Underpredicting swimming speed means the model is conservative for
      collision-risk assessment but non-conservative for time-to-target
      predictions. A clinician relying on the model for treatment planning
      could overestimate transit time.
    status: open
    affected_nodes:
      - "umr_ode"
    affected_verification_ids:
      - "MIME-VER-011"
    workaround: "Re-calibrate drag coefficients per magnet count using experimental data"
    planned_resolution: "Implement magnet-count-dependent drag model or per-configuration calibration"

  - anomaly_id: MIME-ANO-002
    title: "Helix pitch assumed at 8.0mm"
    description: >
      The helix pitch of 8.0mm is estimated from the no-overlap constraint
      (3 fins at 120 degrees must each subtend < 120 degrees over 2.03mm
      axial length, giving pitch > 6.09mm; 8.0mm gives 91 degree sweep,
      29 degree gap). The actual pitch is not stated in de Boer et al. (2025).
    severity: minor
    safety_relevance: safety_relevant
    safety_relevance_rationale: >
      Pitch affects propulsion efficiency; incorrect pitch shifts predicted
      drag and step-out frequency
    status: open
    affected_nodes:
      - "MIME-NODE-008"
    affected_verification_ids:
      - "MIME-VER-010"
      - "MIME-VER-011"
    workaround: "Sensitivity analysis on pitch parameter recommended before clinical use"
    planned_resolution: "Obtain pitch from paper authors or measure from supplementary CAD data"

  - anomaly_id: MIME-ANO-003
    title: "Fin width/thickness parameter swap — CLOSED, code corrected, voxelisation error quantified at 0%"
    description: >
      Originally, create_discontinuous_fins_mask used fin_width (0.55mm) as circumferential
      arc and fin_thickness (0.15mm) as radial overlap, which was incorrect. The code was
      corrected to use fin_thickness as circumferential blade thickness per §VI.F p.15
      (confirmed via external diameter constraint: 2.84mm = 1.74mm + 2 × 0.55mm radial).
      The corrected fins are 4.1 lu circumferential arc at 192^3. Track B production
      sweep (run 8 vs run 9) measured the residual voxelisation error: voxelised and SDF
      masks produce IDENTICAL drag torque (48.0478 vs 48.0478 lu) at 128^3. Orientation
      repeats at 192^3 (0deg, 40deg, 80deg) show torque variance of +/-0.015% — negligible.
    severity: minor
    safety_relevance: safety_relevant
    safety_relevance_rationale: >
      The original 3.67x overwide fin error has been corrected. The residual
      voxelisation error is below measurement precision (0.000% drag difference
      between voxelised and SDF masks at 128^3; +/-0.015% orientation variance
      at 192^3). No safety-relevant systematic error remains.
    status: closed
    affected_nodes:
      - "helix_geometry"
    affected_verification_ids:
      - "MIME-VER-010"
      - "MIME-VER-011"
    workaround: "None needed — anomaly resolved."
    planned_resolution: >
      RESOLVED. Code fix applied (fin_thickness as circumferential blade thickness).
      Track B quantified residual error at 0.000% (128^3) and +/-0.015% (192^3).
      Closed 2026-03-23.
