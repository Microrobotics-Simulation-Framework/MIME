# Matched regularisation experiments (eps_eval = c * dx)
#
# Tests whether matching the BEM eval-sphere regularisation to the IB
# Peskin kernel's effective radius eliminates per-direction wall correction.
#
# Launch:
#   .venv/bin/sky launch -c a40-eps experiments/umr_confinement/jobs/a40_matched_eps.yaml -y

resources:
  cloud: runpod
  accelerators: A40:1
  use_spot: true
  image_id: ghcr.io/microrobotics-simulation-framework/mime:usd-gl

setup: |
  export PYTHONPATH=/opt/usd/lib/python
  export LD_LIBRARY_PATH=/opt/usd/lib:$LD_LIBRARY_PATH
  # Copy updated source files from workdir into the installed package
  cp ~/sky_workdir/src/mime/nodes/environment/lbm/triton_kernels.py \
     /opt/mime/src/mime/nodes/environment/lbm/triton_kernels.py
  cp ~/sky_workdir/src/mime/nodes/environment/defect_correction/fluid_node.py \
     /opt/mime/src/mime/nodes/environment/defect_correction/fluid_node.py
  cp ~/sky_workdir/src/mime/nodes/environment/defect_correction/wall_correction.py \
     /opt/mime/src/mime/nodes/environment/defect_correction/wall_correction.py
  cp ~/sky_workdir/scripts/experiment_matched_eps.py \
     /opt/mime/scripts/experiment_matched_eps.py
  find /opt/mime -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
  python3 -c "
  import jax; print(f'JAX {jax.__version__}: {jax.devices()[0]}')
  import triton, jax_triton; print(f'Triton {triton.__version__}: OK')
  from mime.nodes.environment.lbm.triton_kernels import TRITON_AVAILABLE
  print(f'TRITON={TRITON_AVAILABLE}')
  "

run: |
  export PYTHONPATH=/opt/usd/lib/python
  export LD_LIBRARY_PATH=/opt/usd/lib:$LD_LIBRARY_PATH
  export XLA_FLAGS="--xla_gpu_autotune_level=0 --xla_gpu_enable_triton_gemm=false"
  cd /opt/mime
  python3 scripts/experiment_matched_eps.py --experiments 1,2,5 --resolution 48 2>&1

workdir: "."
