name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Checkout MADDENING (private, same org)
        uses: actions/checkout@v4
        with:
          repository: Microrobotics-Simulation-Framework/MADDENING
          path: _maddening
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "jax==0.5.1" "jaxlib==0.5.1"
          pip install -e _maddening
          pip install -e ".[ci]"

      - name: Run tests
        env:
          JAX_PLATFORMS: cpu
          XLA_FLAGS: "--xla_gpu_autotune_level=0"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          python -m pytest tests/ -v --tb=short

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies (no JAX needed for anomaly/citation checks)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate anomaly registry
        run: python scripts/check_anomalies.py

      - name: Check bibliography citations
        run: python scripts/check_citations.py

      - name: Check implementation mapping (requires MADDENING + JAX)
        uses: actions/checkout@v4
        with:
          repository: Microrobotics-Simulation-Framework/MADDENING
          path: _maddening
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MADDENING and MIME for impl mapping check
        run: |
          pip install "jax==0.5.1" "jaxlib==0.5.1"
          pip install -e _maddening
          pip install -e ".[ci]"

      - name: Run implementation mapping check
        run: python scripts/check_impl_mapping.py
