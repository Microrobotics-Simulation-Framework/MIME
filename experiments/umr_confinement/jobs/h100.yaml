version: 1

# UMR confinement experiment — live FSI simulation on H100 SXM
#
# This job runs the 4-node FSI graph (IBLBMFluidNode + RigidBodyNode +
# ExternalMagneticFieldNode + PermanentMagnetResponseNode) via mime.runner
# with ZMQ publishing for MICROROBOTICA connection.
#
# Launch from MICROROBOTICA:
#   Run Config Panel → Cloud mode → Launch
# Or from CLI:
#   python3 scripts/launch_job.py --job experiments/umr_confinement/jobs/h100.yaml
#
# Connect MICROROBOTICA:
#   The SkyPilot monitor panel shows the cluster IP.
#   ConnectionManager opens an SSH tunnel automatically.
#   ZMQ endpoint: tcp://localhost:5556 (via tunnel)

provider: runpod
gpu_type: "H100-SXM"
gpu_count: 1
use_spot: false
region: ""
disk_size: 30

cost:
  max_cost_per_hour: 4.00
  max_total_budget: 15.00
  autostop_minutes: 120   # 2-hour safety net for interactive demo
  auto_teardown: true
  spot_fallback: false

container_image: "ghcr.io/microrobotics-simulation-framework/mime:usd-gl"

envs:
  XLA_FLAGS: "--xla_gpu_enable_latency_hiding_scheduler"

setup: |
  python3 -c "
  import os; os.environ['JAX_PLATFORM_NAME'] = 'gpu'
  import jax
  assert jax.default_backend() == 'gpu', f'Expected gpu, got {jax.default_backend()}'
  print(f'JAX {jax.__version__}: GPU OK ({jax.devices()[0]})')
  "
  python3 -c "from pxr import Usd, UsdImagingGL; print('OpenUSD + GL: OK')"
  python3 -c "from mime.nodes.environment.lbm import IBLBMFluidNode; print('MIME: OK')"

run: |
  python3 -m mime.runner experiment.yaml

workdir: "."
