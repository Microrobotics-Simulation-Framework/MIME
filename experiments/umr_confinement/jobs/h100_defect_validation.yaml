version: 1

# Defect correction resolution convergence validation on H100 SXM
#
# Runs DefectCorrectionFluidNode at 64³ and 96³ with auto method.
# Compares full 6×6 R matrix against NN-BEM reference (sphere-in-cylinder, λ=0.3).
#
# Expected runtime: ~30 min on H100 SXM (~$1.50)
# Expected VRAM: ~2 GB at 96³
#
# Launch:
#   python3 scripts/launch_job.py --job experiments/umr_confinement/jobs/h100_defect_validation.yaml

provider: runpod
gpu_type: "H100-SXM"
gpu_count: 1
use_spot: false
region: ""
disk_size: 30

cost:
  max_cost_per_hour: 4.00
  max_total_budget: 60.00
  autostop_minutes: 60
  auto_teardown: true
  spot_fallback: false

container_image: "ghcr.io/microrobotics-simulation-framework/mime:usd-gl"

setup: |
  export PYTHONPATH=/opt/usd/lib/python
  export LD_LIBRARY_PATH=/opt/usd/lib:$LD_LIBRARY_PATH
  pip3 install --break-system-packages -e .
  python3 -c "
  import os; os.environ['JAX_PLATFORM_NAME'] = 'gpu'
  import jax
  assert jax.default_backend() == 'gpu', f'Expected gpu, got {jax.default_backend()}'
  print(f'JAX {jax.__version__}: GPU OK ({jax.devices()[0]})')
  "
  python3 -c "from mime.nodes.environment.defect_correction import DefectCorrectionFluidNode; print('DC: OK')"

run: |
  export PYTHONPATH=/opt/usd/lib/python
  export LD_LIBRARY_PATH=/opt/usd/lib:$LD_LIBRARY_PATH
  cd /opt/mime
  python3 scripts/run_defect_correction_validation.py \
    --resolutions 64,96,128 \
    --methods auto \
    --output data/defect_correction_validation.json \
    2>&1 | tee data/defect_correction_validation.log
  touch data/defect_correction_validation.done

workdir: "."
